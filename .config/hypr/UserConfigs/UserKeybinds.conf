# /* ---- 💫 https://github.com/LinuxBeginnings 💫 ---- */  #
# This is where you put your own keybinds. Be Mindful to check as well ~/.config/hypr/configs/Keybinds.conf to avoid conflict
# if you think I should replace the Pre-defined Keybinds in ~/.config/hypr/configs/Keybinds.conf , submit an issue or let me know in DC and present me a valid reason as to why, such as conflicting with global shortcuts, etc etc

# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

#  IMPORTANT: If you want to remap and existing keybind you MUST unbindd it first 

# The bindings are CASE SENSITIVE. We suggest you copy the exisitng binding here
#  Then change `bindd` to `unbind`

# E.g. 
# unbind = $mainMod, Return, Open terminal, exec, $term
# bindd = $mainMod, Return, Open terminal, exec, ghostty 
#
# unbind = $mainMod, E, file manager, exec, $files
# bindd = $mainMod, T, file manager, exec, $files

# If you are ADDING a bindd, make sure you include the description
# Other the keybind search menu might not show it properly

# Close window: Shift+Q
unbind = $mainMod, Q, close active window, killactive,
unbind = $mainMod SHIFT, Q, Terminate active process, exec, $scriptsDir/KillActiveProcess.sh
bindd = $mainMod SHIFT, Q, close active window, killactive,

# Fullscreen: F instead of Shift+F
unbind = $mainMod SHIFT, F, fullscreen, fullscreen
bindd = $mainMod, F, fullscreen, fullscreen

# Float toggle: Shift+Space instead of Space
unbind = $mainMod, SPACE, Float current window, togglefloating,
bindd = $mainMod SHIFT, SPACE, Float current window, togglefloating,

# Unbind original Shift+Arrows (resize) and Ctrl+Arrows (move)
unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down
unbind = $mainMod CTRL, left
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, up
unbind = $mainMod CTRL, down

# Move windows: Shift+Arrows
bindd = $mainMod SHIFT, left, move window left, movewindow, l
bindd = $mainMod SHIFT, right, move window right, movewindow, r
bindd = $mainMod SHIFT, up, move window up, movewindow, u
bindd = $mainMod SHIFT, down, move window down, movewindow, d

# Resize: Ctrl+Arrows
binded = $mainMod CTRL, left, resize left, resizeactive, -50 0
binded = $mainMod CTRL, right, resize right, resizeactive, 50 0
binded = $mainMod CTRL, up, resize up, resizeactive, 0 -50
binded = $mainMod CTRL, down, resize down, resizeactive, 0 50

# Disable theme/wallpaper switchers
unbind = $mainMod, T
unbind = $mainMod, W
unbind = $mainMod SHIFT, W
unbind = CTRL ALT, W

# Swap Shift (silent) and Ctrl (follow) for moving to workspaces
unbind = $mainMod SHIFT, code:10
unbind = $mainMod SHIFT, code:11
unbind = $mainMod SHIFT, code:12
unbind = $mainMod SHIFT, code:13
unbind = $mainMod SHIFT, code:14
unbind = $mainMod SHIFT, code:15
unbind = $mainMod SHIFT, code:16
unbind = $mainMod SHIFT, code:17
unbind = $mainMod SHIFT, code:18
unbind = $mainMod SHIFT, code:19
unbind = $mainMod CTRL, code:10
unbind = $mainMod CTRL, code:11
unbind = $mainMod CTRL, code:12
unbind = $mainMod CTRL, code:13
unbind = $mainMod CTRL, code:14
unbind = $mainMod CTRL, code:15
unbind = $mainMod CTRL, code:16
unbind = $mainMod CTRL, code:17
unbind = $mainMod CTRL, code:18
unbind = $mainMod CTRL, code:19

bindd = $mainMod SHIFT, code:10, move silently to workspace 1, movetoworkspacesilent, 1
bindd = $mainMod SHIFT, code:11, move silently to workspace 2, movetoworkspacesilent, 2
bindd = $mainMod SHIFT, code:12, move silently to workspace 3, movetoworkspacesilent, 3
bindd = $mainMod SHIFT, code:13, move silently to workspace 4, movetoworkspacesilent, 4
bindd = $mainMod SHIFT, code:14, move silently to workspace 5, movetoworkspacesilent, 5
bindd = $mainMod SHIFT, code:15, move silently to workspace 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, code:16, move silently to workspace 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, code:17, move silently to workspace 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, code:18, move silently to workspace 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, code:19, move silently to workspace 10, movetoworkspacesilent, 10

bindd = $mainMod CTRL, code:10, move to workspace 1, movetoworkspace, 1
bindd = $mainMod CTRL, code:11, move to workspace 2, movetoworkspace, 2
bindd = $mainMod CTRL, code:12, move to workspace 3, movetoworkspace, 3
bindd = $mainMod CTRL, code:13, move to workspace 4, movetoworkspace, 4
bindd = $mainMod CTRL, code:14, move to workspace 5, movetoworkspace, 5
bindd = $mainMod CTRL, code:15, move to workspace 6, movetoworkspace, 6
bindd = $mainMod CTRL, code:16, move to workspace 7, movetoworkspace, 7
bindd = $mainMod CTRL, code:17, move to workspace 8, movetoworkspace, 8
bindd = $mainMod CTRL, code:18, move to workspace 9, movetoworkspace, 9
bindd = $mainMod CTRL, code:19, move to workspace 10, movetoworkspace, 10

# Refresh bar and menus: Shift+R instead of Alt+R
unbind = $mainMod ALT, R
bindd = $mainMod SHIFT, R, refresh bar and menus, exec, $scriptsDir/Refresh.sh

# Power menu: Mod+BackSpace
bindd = $mainMod, BackSpace, power menu, exec, $scriptsDir/Wlogout.sh









