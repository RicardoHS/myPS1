# Red/Black hyprlock theme
# Based on JaKooLit config, customized for #aa3333 theme

$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $HOME/wallpaper.jpg

    color = rgb(0,0,0)

    blur_size = 5
    blur_passes = 3
    noise = 0.0117
    contrast = 1.1000
    brightness = 0.4000
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> "$(date +'%A, %-d %B')" </b>"
    color = rgb(aa3333)
    font_size = 64
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -20
    halign = center
    valign = center
}

# Time (24h)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(ffffff)
    font_size = 173
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -133
    halign = center
    valign = top
}

# USER
label {
    monitor =
    text =   $USER
    color = rgb(aa3333)
    font_size = 48
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 300
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 306, 93
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(aa3333)
    inner_color = rgba(0, 0, 0, 0.8)
    capslock_color = rgb(ff0000)
    font_color = rgb(ffffff)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold
    placeholder_text = <i><span foreground="##aa333399">🔒 Type Password</span></i>
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
}

# Keyboard LAYOUT
label {
    monitor =
    text = $LAYOUT
    color = rgb(aa3333)
    font_size = 19
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 53
    halign = center
    valign = bottom
}

# Uptime
label {
    monitor =
    text = cmd[update:60000] echo "<b> "$(uptime -p || $Scripts/UptimeNixOS.sh)" </b>"
    color = rgb(aa3333)
    font_size = 32
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 0
    halign = right
    valign = bottom
}

# Weather
label {
    monitor =
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat  "$HOME/.cache/.weather_cache"
    color = rgb(aa3333)
    font_size = 19
    font_family = JetBrainsMono Nerd Font Bold
    position = 50, 0
    halign = left
    valign = bottom
}
