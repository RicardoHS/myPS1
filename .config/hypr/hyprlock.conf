# Red/Black hyprlock theme - SDDM-like layout
# Left panel on DP-1, wallpaper only on HDMI-A-2

$Scripts = $HOME/.config/hypr/scripts

# Panel config — change these to adjust layout
# panelCenter = (panelW/2) - 1280
$panelW = 853
$panelCenter = -854
$contentW = 500
$secCenter = -690

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

# Background - both monitors
background {
    monitor =
    path = $HOME/wallpaper.jpg
    color = rgb(0,0,0)
    blur_size = 5
    blur_passes = 3
    noise = 0.0117
    contrast = 1.1000
    brightness = 0.5000
    vibrancy = 0.1
    vibrancy_darkness = 0.0
}

# ═══════════════════════════════════════
# DP-1 only — left panel with login form
# ═══════════════════════════════════════

# Dark panel
shape {
    monitor = DP-1
    size = $panelW, 1440
    color = rgba(0, 0, 0, 0.80)
    border_size = 0
    position = 0, 0
    halign = left
    valign = center
}

# Accent line - right edge of panel
shape {
    monitor = DP-1
    size = 2, 1440
    color = rgb(aa3333)
    border_size = 0
    position = $panelW, 0
    halign = left
    valign = center
}

# ─── Top section: Time & Date ───

# Time
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgb(ffffff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = $panelCenter, -100
    halign = center
    valign = top
}

# Seconds
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$(date +"%S")"
    color = rgb(aa3333)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold
    position = $secCenter, -170
    halign = center
    valign = top
}

# Date
label {
    monitor = DP-1
    text = cmd[update:18000000] echo "$(date +'%A, %-d %B')"
    color = rgba(170, 51, 51, 0.8)
    font_size = 16
    font_family = JetBrainsMono Nerd Font Bold
    position = $panelCenter, -230
    halign = center
    valign = top
}

# ─── Center section: Login form ───

# USER
label {
    monitor = DP-1
    text = $USER
    color = rgb(ffffff)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Bold
    position = $panelCenter, 60
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor = DP-1
    size = $contentW, 48
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(aa3333)
    inner_color = rgba(10, 0, 0, 0.9)
    capslock_color = rgb(ff0000)
    font_color = rgb(ffffff)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Bold
    placeholder_text = <i><span foreground="##aa333366">Password</span></i>
    hide_input = false
    position = $panelCenter, -10
    halign = center
    valign = center
}

# Keyboard LAYOUT
label {
    monitor = DP-1
    text = $LAYOUT
    color = rgba(170, 51, 51, 0.6)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Bold
    position = $panelCenter, -55
    halign = center
    valign = center
}

# Uptime - below keyboard layout
label {
    monitor = DP-1
    text = cmd[update:60000] echo "$(uptime -p || $Scripts/UptimeNixOS.sh)"
    color = rgba(170, 51, 51, 0.5)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold
    position = $panelCenter, -85
    halign = center
    valign = center
}

# Weather
label {
    monitor = DP-1
    text = cmd[update:3600000] [ -f "$HOME/.cache/.weather_cache" ] && cat "$HOME/.cache/.weather_cache"
    color = rgba(170, 51, 51, 0.5)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Bold
    position = 177, 30
    halign = left
    valign = bottom
}
